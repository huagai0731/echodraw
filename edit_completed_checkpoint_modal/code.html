<!DOCTYPE html>

<html class="" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Checkpoint</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#98DBC6", // mint blue-green
                        "background-light": "#EFEAE7", // milky white (for light mode)
                        "background-dark": "#221B1B", // deep coffee brown
                        "coffee-brown-secondary": "#4A3F4A",
                        "light-blue": "#C5E1E2",
                        "milky-white": "#EFEAE7",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'glow': '0 0 15px 5px rgba(152, 219, 198, 0.15)',
                    },
                },
            },
        }
    </script>
<style>
        .font-display {
            font-family: 'Spline Sans', sans-serif;
            font-weight: 300; /* ultra-thin as requested */
        }
        .form-input:focus {
             box-shadow: 0 0 0 2px #221B1B, 0 0 0 4px #98DBC6; /* Mint glow focus */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .soft-light-spot {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(152, 219, 198, 0.1) 0%, rgba(152, 219, 198, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-screen w-full flex-col justify-center items-center p-4" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAW0xfTbKJO1crE8DfirgAp0IEvH30thAt5YlJZL3xeNXVZWp7bisfmRnvHDLWkqJk6ZWz0lr6GjzQUIM_MdudN9E1T8OymyF88GwbfITNIwN3xBsB3G-2j0HFhLY_AZIHXLAEoBim9cliY8hE87qBkVAZ8selMA4injaZ8-ZoTXyLAH1GTvpKtA8PCw20Bx-QpIUkyqxFlBjUCSn5IZKSmV1JUJeT6j7iXTlZm6nYyBn9oN-LplOaZgCaVILA5AoT_uYgVGcv1Gml2'); background-size: cover; background-position: center;">
<!-- Background elements for visual effect -->
<div class="absolute inset-0 bg-background-dark/50"></div>
<div class="soft-light-spot" style="top: 10%; left: -50px;"></div>
<div class="soft-light-spot" style="bottom: 5%; right: -70px;"></div>
<!-- Start of Modal -->
<div class="relative z-10 flex w-full max-w-sm flex-col overflow-hidden rounded-xl border border-white/10 bg-background-dark/70 backdrop-blur-xl shadow-glow">
<!-- BottomSheetHandle -->
<div class="flex h-5 w-full items-center justify-center pt-3">
<div class="h-1 w-9 rounded-full bg-white/20"></div>
</div>
<!-- HeadlineText -->
<h3 class="text-white tracking-light text-2xl font-light leading-tight text-center pb-2 pt-3">Edit Checkpoint</h3>
<div class="flex flex-col p-4 space-y-6">
<!-- EmptyState adapted as Image Uploader -->
<div class="flex flex-col items-center gap-4 rounded-lg border-2 border-dashed border-white/20 p-6 bg-white/5 cursor-pointer">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary text-4xl">add_photo_alternate</span>
<p class="text-white text-lg font-normal leading-tight tracking-wide">Change Image</p>
<p class="text-white/60 text-sm font-light leading-normal text-center">Upload a new image for the checkpoint</p>
</div>
</div>
<!-- TextField -->
<label class="flex flex-col w-full">
<p class="text-white/80 text-base font-normal leading-normal pb-2">Description</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-milky-white focus:outline-0 border border-white/20 bg-white/5 focus:border-primary min-h-36 placeholder:text-white/40 p-4 text-base font-light leading-normal transition-shadow duration-300" placeholder="Describe your creation or feelings for this checkpoint..."></textarea>
</label>
</div>
<!-- ButtonGroup -->
<div class="flex flex-1 gap-3 flex-wrap px-4 py-4 justify-between bg-black/10">
<button class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-transparent border border-primary text-primary text-base font-normal leading-normal tracking-wide hover:bg-primary/10 transition-colors">
<span class="truncate">Cancel</span>
</button>
<button class="flex-1 flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-background-dark text-base font-medium leading-normal tracking-wide hover:opacity-90 transition-opacity">
<span class="truncate">Save</span>
</button>
</div>
</div>
<!-- End of Modal -->
</div>
</body></html>
