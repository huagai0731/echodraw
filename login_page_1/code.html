<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2beeb0", /* Fallback color, will be overridden by user colors */
                        "background-light": "#f6f8f7", /* Fallback color */
                        "background-dark": "#10221c", /* Fallback color */
                        /* EchoDraw Theme */
                        "brand-deep-coffee": "#221B1B",
                        "brand-mint": "#98DBC6",
                        "brand-white": "#FFFFFF",
                        "brand-brown": "#4A3F4A",
                        "brand-light-blue": "#C5E1E2",
                        "brand-milky-white": "#EFEAE7",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-custom {
            background-color: rgba(255, 255, 255, 0.05); /* Translucent */
            border: 1px solid rgba(152, 219, 198, 0.2); /* Subtle Mint Border */
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-input-custom:focus-within, .form-input-custom:focus {
            border-color: #98DBC6; /* Mint Glow */
            box-shadow: 0 0 10px 0 rgba(152, 219, 198, 0.3); /* Mint Glow */
            background-color: rgba(255, 255, 255, 0.1); /* Brighter translucent on focus */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased">
<div class="relative flex h-screen min-h-[600px] w-full flex-col items-center justify-center bg-brand-deep-coffee font-display group/design-root overflow-hidden p-4">
<!-- Diffused Background Shapes -->
<div class="absolute top-[-20%] left-[-20%] h-[400px] w-[400px] rounded-full bg-brand-mint/5 blur-[120px]"></div>
<div class="absolute bottom-[-25%] right-[-15%] h-[500px] w-[500px] rounded-full bg-brand-brown/10 blur-[150px]"></div>
<div class="absolute top-[10%] right-[5%] h-[200px] w-[300px] rounded-full bg-brand-light-blue/5 blur-[100px]"></div>
<main class="relative z-10 flex w-full max-w-sm flex-col items-center">
<h1 class="text-brand-white tracking-light text-[32px] font-light leading-tight text-center pb-12 pt-6">EchoDraw</h1>
<div class="flex w-full flex-col gap-6">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-brand-milky-white/80 text-base font-light leading-normal pb-2">邮箱 (Email)</p>
<input class="form-input-custom flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-brand-white focus:outline-0 focus:ring-0 h-14 placeholder:text-brand-milky-white/50 p-[15px] text-base font-normal leading-normal" placeholder="Enter your email" type="email" value=""/>
</label>
<label class="flex flex-col min-w-40 flex-1">
<p class="text-brand-milky-white/80 text-base font-light leading-normal pb-2">密码 (Password)</p>
<div class="flex w-full flex-1 items-stretch rounded-lg form-input-custom">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-brand-white focus:outline-0 focus:ring-0 h-14 placeholder:text-brand-milky-white/50 p-[15px] pr-2 text-base font-normal leading-normal bg-transparent border-0" placeholder="Enter your password" type="password" value=""/>
<div class="text-brand-milky-white/60 flex items-center justify-center pr-[15px] bg-transparent">
<span class="material-symbols-outlined cursor-pointer">visibility_off</span>
</div>
</div>
</label>
</div>
<div class="flex w-full px-0 py-3 mt-4">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 flex-1 bg-brand-mint text-brand-deep-coffee text-base font-medium leading-normal tracking-[0.015em] transition-transform duration-200 ease-in-out hover:scale-[1.02] active:scale-[0.98]">
<span class="truncate">登录 (Login)</span>
</button>
</div>
<p class="text-brand-white text-sm font-light leading-normal pb-3 pt-4 px-4 text-center underline opacity-70 hover:opacity-100 transition-opacity">忘记密码? (Forgot Password?)</p>
</main>
</div>
</body></html>
