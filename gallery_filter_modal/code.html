<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#98DBC6", // Mint Blue-Green
            "background-light": "#EFEAE7", // Milky White
            "background-dark": "#221B1B", // Deep Coffee Brown
            "secondary-dark": "#4A3F4A", // Brown
            "secondary-light": "#C5E1E2", // Light Blue
            "text-light": "#221B1B",
            "text-dark": "#FFFFFF"
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "Noto Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "0.75rem",
            "xl": "1rem",
            "full": "9999px"
          },
          boxShadow: {
            'glow': '0 0 12px 0 rgba(152, 219, 198, 0.5)',
          }
        },
      },
    }

<style>
    .material-symbols-outlined {

    }
  </style>
<style>
