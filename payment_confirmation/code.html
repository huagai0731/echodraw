<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - 确认订单</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            font-weight: 300;}
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .frosted-glass {
            background-color: rgba(74, 63, 74, 0.2);backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(197, 225, 226, 0.1);}
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .bg-pattern-shape {
            position: absolute;
            border-radius: 9999px;
            background-color: #98DBC6;opacity: 0.1;
            filter: blur(80px);
        }
        .radio-custom:checked + label {
            border-color: #98DBC6;
            background-color: rgba(152, 219, 198, 0.1);
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#98DBC6","background-light": "#221B1B","background-dark": "#221B1B","brand-white": "#FFFFFF",
              "brand-brown-light": "#4A3F4A",
              "brand-blue-light": "#C5E1E2",
              "brand-milky": "#EFEAE7",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.75rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col text-brand-white group/design-root overflow-hidden">
<div aria-hidden="true" class="bg-pattern">
<div class="bg-pattern-shape" style="width: 300px; height: 300px; top: 5%; left: -20%;"></div>
<div class="bg-pattern-shape" style="width: 400px; height: 400px; top: 40%; right: -30%;"></div>
<div class="bg-pattern-shape" style="width: 250px; height: 250px; bottom: 10%; left: 10%;"></div>
</div>
<div class="relative z-10 flex flex-col h-full">
<div class="flex shrink-0 items-center p-4">
<div class="flex size-10 shrink-0 items-center justify-center text-brand-white">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="flex-1 text-center text-lg font-medium leading-tight tracking-wider text-brand-white/90">确认订单</h2>
<div class="size-10 shrink-0"></div> 
</div>
<main class="flex-grow px-4 pb-32 pt-8">
<div class="frosted-glass rounded-xl p-6">
<div class="flex justify-between gap-x-6 py-3">
<p class="text-brand-white/70 text-sm font-light leading-normal tracking-wide">购买会员版本</p>
<p class="text-brand-white text-sm font-normal leading-normal text-right">专业版</p>
</div>
<div class="my-3 border-t border-brand-white/10"></div>
<div class="flex justify-between gap-x-6 py-3">
<p class="text-brand-white/70 text-sm font-light leading-normal tracking-wide">金额</p>
<p class="text-brand-white text-sm font-normal leading-normal text-right">¥128.00</p>
</div>
</div>
<div class="frosted-glass rounded-xl p-6 mt-6">
<div class="space-y-3">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-base mt-0.5">check_circle</span>
<p class="text-brand-white/90 text-sm font-light leading-normal">无限项目记录和创作报告</p>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-base mt-0.5">check_circle</span>
<p class="text-brand-white/90 text-sm font-light leading-normal">高级情绪和时间分析</p>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary text-base mt-0.5">check_circle</span>
<p class="text-brand-white/90 text-sm font-light leading-normal">独家艺术风格主题</p>
</div>
</div>
</div>
<div class="mt-8">
<p class="px-2 pb-4 text-sm font-light leading-normal tracking-wide text-brand-white/70">支付方式</p>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<input checked="" class="invisible absolute radio-custom peer" id="wechat-pay" name="paymentMethod" type="radio" value="wechat"/>
<label class="frosted-glass flex flex-col items-center justify-center gap-3 rounded-xl p-4 min-h-[120px] border border-transparent peer-checked:border-primary transition-colors duration-300" for="wechat-pay">
<div class="flex size-12 items-center justify-center rounded-lg bg-brand-brown-light/50">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span> 
</div>
<p class="text-brand-white text-sm font-normal leading-normal">微信支付</p>
</label>
</div>
<div class="relative">
<input class="invisible absolute radio-custom peer" id="alipay" name="paymentMethod" type="radio" value="alipay"/>
<label class="frosted-glass flex flex-col items-center justify-center gap-3 rounded-xl p-4 min-h-[120px] border border-transparent peer-checked:border-primary transition-colors duration-300" for="alipay">
<div class="flex size-12 items-center justify-center rounded-lg bg-brand-brown-light/50">
<span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
</div>
<p class="text-brand-white text-sm font-normal leading-normal">支付宝</p>
</label>
</div>
</div>
</div>
<div class="mt-12 text-center text-sm font-light tracking-wide text-brand-white/70">
<p>支付后的会员到期时间：2025-07-16</p>
<p class="mt-3 text-brand-white/90">你的创作之旅将更加精彩！</p>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 z-20 bg-gradient-to-t from-background-dark to-transparent p-4 pt-8">
<button class="flex h-14 w-full items-center justify-center rounded-xl bg-primary text-background-dark text-base font-semibold tracking-wider transition-transform duration-300 hover:scale-[1.02] active:scale-[0.98]">
                确认支付
            </button>
</footer>
</div>
</div>
</body></html>
