<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Mental State Assessment</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
    body {
      font-family: 'Spline Sans', sans-serif;
      font-weight: 300;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .has-[:checked] .radio-circle-outer {
      border-color: var(--circle-color);
      background-color: color-mix(in srgb, var(--circle-color) 10%, transparent);
      box-shadow: 0 0 15px color-mix(in srgb, var(--circle-color) 50%, transparent);
    }
    .has-[:checked] .radio-circle-inner {
      transform: scale(1);
      background-color: var(--circle-color);
    }
    .glowing-segment {
      box-shadow: 0 0 10px 0px rgba(152, 219, 198, 0.7);
    }
    .glow-line {
      filter: drop-shadow(0 0 3px rgba(152, 219, 198, 0.6));
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2bee8c",
            "background-light": "#f6f8f7",
            "background-dark": "#102219",
            "brand-bg": "#221B1B",
            "brand-accent": "#98DBC6",
            "brand-white": "#FFFFFF",
            "brand-brown": "#4A3F4A",
            "brand-light-blue": "#C5E1E2",
            "brand-milky-white": "#EFEAE7",
            "mint-blue-1": "#87D7D8",
            "mint-blue-2": "#91D9CF",
            "mint-yellow-1": "#A1DDC0",
            "mint-yellow-2": "#ADDEBA",
          },
          fontFamily: {
            "display": ["Spline Sans"]
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "2rem",
            "xl": "3rem",
            "full": "9999px"
          },
          animation: {
            'glow': 'glow 4s ease-in-out infinite',
          },
          keyframes: {
            glow: {
              '0%, 100%': { opacity: 0.6 },
              '50%': { opacity: 1 },
            }
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>

      min-height: max(884px, 100dvh);

</div>
<div class="relative z-10 flex flex-col flex-grow h-full pt-4">

<div class="h-full w-1/6 rounded-full bg-brand-accent glowing-segment"></div>

<div class="h-full w-1/6 rounded-full bg-brand-brown"></div>

<div class="absolute -bottom-6 right-6 w-px h-6 bg-mint-yellow-2 glow-line animate-glow"></div>
