<!DOCTYPE html>

<html class="dark" lang="zh"><head>

<title>EchoDraw - Points Recharge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
            font-weight: 300;
        }
        .font-display {
            font-family: 'Spline Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 300,
            'GRAD' 0,
            'opsz' 24
        }
        .bg-gradient-halo {
            background: radial-gradient(circle at 20% 20%, rgba(152, 219, 198, 0.08), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(74, 63, 74, 0.1), transparent 50%);
        }
        .pricing-card-selected {
            border-color: #98DBC6;
            box-shadow: 0 0 15px rgba(152, 219, 198, 0.3);
        }
        .payment-button-selected {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #98DBC6;
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-[#221B1B] font-display">

<div class="flex items-center p-4 pb-2 justify-between">

<div class="flex items-center justify-between">
<h1 class="text-[#EFEAE7] text-lg font-normal leading-tight">1点</h1>
<p class="flex items-baseline gap-1 text-[#FFFFFF]">
<span class="text-[#FFFFFF] text-2xl font-bold leading-tight tracking-[-0.033em]">¥1</span>
</p>
</div>
<p class="text-[#C5E1E2] text-sm font-light">A small boost.</p>
</div>
<!-- Card 2 - Selected -->
<div class="flex flex-1 flex-col gap-4 rounded-lg border border-solid p-6 backdrop-blur-md transition-all duration-300 pricing-card-selected" style="background-color: rgba(74, 63, 74, 0.4)">

<h1 class="text-[#EFEAE7] text-lg font-normal leading-tight">5点</h1>
<p class="flex items-baseline gap-1 text-[#FFFFFF]">
<span class="text-[#FFFFFF] text-2xl font-bold leading-tight tracking-[-0.033em]">¥5</span>
</p>
</div>
<p class="text-[#C5E1E2] text-sm font-light">Unlock your potential.</p>
</div>
<!-- Card 3 -->
<div class="flex flex-1 flex-col gap-4 rounded-lg border border-solid border-[#4A3F4A]/50 bg-[#4A3F4A]/30 p-6 backdrop-blur-md transition-all duration-300">

<p class="flex items-baseline gap-1 text-[#FFFFFF]">
<span class="text-[#FFFFFF] text-2xl font-bold leading-tight tracking-[-0.033em]">¥20</span>
</p>
</div>
<p class="text-[#C5E1E2] text-sm font-light">For deep creative investment.</p>
</div>
</div>

</div>
</div>

<div class="flex-grow"></div>
<!-- Confirmation Button -->
<div class="sticky bottom-0 w-full bg-gradient-to-t from-[#221B1B] via-[#221B1B]/80 to-transparent p-6 pt-4">
<button class="flex w-full min-w-[84px] max-w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-14 px-4 bg-[#98DBC6] text-[#221B1B] text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">立即支付 ¥5</span>
</button>

</div>
