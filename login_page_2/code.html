<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2beeb0",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                        "brand-deep-coffee": "#221B1B",
                        "brand-mint": "#98DBC6",
                        "brand-white": "#FFFFFF",
                        "brand-brown": "#4A3F4A",
                        "brand-light-blue": "#C5E1E2",
                        "brand-milky-white": "#EFEAE7",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'mint-soft': '0 10px 30px -10px rgba(152, 219, 198, 0.25)',
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-custom {
            background-color: rgba(74, 63, 74, 0.2); 
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(152, 219, 198, 0.2); 
            transition: all 0.3s ease;
        }
        .form-input-custom:focus-within, .form-input-custom:focus {
            border-color: rgba(152, 219, 198, 0.7); 
            box-shadow: 0 0 15px 2px rgba(152, 219, 198, 0.2);
            background-color: rgba(74, 63, 74, 0.4); 
        }
        body {
          min-height: max(884px, 100dvh);
          overflow: hidden;
        }
        @keyframes subtle-breath {
          0%, 100% { transform: scale(1); opacity: 0.1; }
          50% { transform: scale(1.15); opacity: 0.15; }
        }
        .breathing-glow-1 {
            animation: subtle-breath 12s ease-in-out infinite;
        }
        .breathing-glow-2 {
            animation: subtle-breath 15s ease-in-out infinite reverse;
        }
        .breathing-glow-3 {
            animation: subtle-breath 18s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased">
<div class="relative flex h-screen min-h-[884px] w-full flex-col bg-brand-deep-coffee font-display group/design-root overflow-hidden">
<div class="absolute top-[-25%] left-[-30%] h-[500px] w-[500px] rounded-full bg-brand-mint/10 blur-[150px] breathing-glow-1"></div>
<div class="absolute bottom-[-30%] right-[-25%] h-[600px] w-[600px] rounded-full bg-brand-brown/20 blur-[160px] breathing-glow-2"></div>
<div class="absolute top-[15%] right-[-10%] h-[300px] w-[400px] rounded-full bg-brand-light-blue/10 blur-[130px] breathing-glow-3"></div>
<main class="relative z-10 flex h-full w-full flex-col justify-between p-8">
<div class="pt-16">
<h1 class="text-[40px] font-extralight leading-tight text-brand-milky-white">再次创作，<br/>记录灵感</h1>
<p class="mt-3 font-light text-brand-milky-white/70">Welcome back to EchoDraw</p>
</div>
<div class="flex flex-col gap-y-12">
<div class="flex flex-col gap-5">
<div class="form-input-custom group flex flex-col rounded-xl px-4 pt-3 pb-2 transition-all duration-300">
<label class="text-xs font-light text-brand-milky-white/60 group-focus-within:text-brand-mint">邮箱 (Email)</label>
<input class="form-input h-8 w-full min-w-0 flex-1 resize-none overflow-hidden border-0 bg-transparent p-0 text-base font-normal text-brand-white placeholder:text-brand-milky-white/30 focus:outline-0 focus:ring-0" placeholder="yourname@email.com" type="email" value=""/>
</div>
<div class="form-input-custom group flex flex-col rounded-xl px-4 pt-3 pb-2 transition-all duration-300">
<label class="text-xs font-light text-brand-milky-white/60 group-focus-within:text-brand-mint">密码 (Password)</label>
<input class="form-input h-8 w-full min-w-0 flex-1 resize-none overflow-hidden border-0 bg-transparent p-0 text-base font-normal text-brand-white placeholder:text-brand-milky-white/30 focus:outline-0 focus:ring-0" placeholder="············" type="password" value=""/>
</div>
</div>
<div class="flex flex-col items-center gap-y-6">
<button class="flex min-w-[84px] w-full max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-brand-mint text-brand-deep-coffee shadow-mint-soft text-base font-medium tracking-[0.015em] transition-transform duration-200 ease-in-out hover:scale-[1.02] active:scale-[0.98]">
<span class="truncate">登录 (Login)</span>
</button>
<a class="text-brand-white/60 text-sm font-light leading-normal transition-colors hover:text-brand-white" href="#">忘记密码? (Forgot Password?)</a>
</div>
</div>
</main>
</div>

</body></html>
