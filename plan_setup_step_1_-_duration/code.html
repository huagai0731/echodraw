<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Create New Challenge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 200,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#98DBC6", /* Mint Blue-Green */
                        "background-dark": "#221B1B", /* Deep Coffee Brown */
                        "white": "#FFFFFF",
                        "brown-tint": "#4A3F4A",
                        "light-blue": "#C5E1E2",
                        "milky-white": "#EFEAE7",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'abstract-pattern': "url(\"data:image/svg+xml,%3Csvg width='800' height='800' viewBox='0 0 800 800' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cfilter id='b' x='-20%25' y='-20%25' width='140%25' height='140%25'%3E%3CfeGaussianBlur stdDeviation='80'/%3E%3C/filter%3E%3C/defs%3E%3Cg fill-opacity='0.1'%3E%3Crect x='0' y='0' width='100%25' height='100%25' fill='%23221B1B'/%3E%3Ccircle cx='500' cy='300' r='150' fill='%2398DBC6' filter='url(%23b)'/%3E%3Crect x='100' y='500' width='200' height='200' fill='%2398DBC6' filter='url(%23b)' transform='rotate(15 100 500)'/%3E%3Ccircle cx='200' cy='100' r='100' fill='%234A3F4A' filter='url(%23b)'/%3E%3C/g%3E%3C/svg%3E\")",
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark dark group/design-root overflow-x-hidden">
<div class="absolute inset-0 bg-abstract-pattern bg-cover bg-center opacity-30"></div>
<div class="relative z-10 flex flex-col h-screen px-6 pt-12">
<!-- Headline -->
<h1 class="text-white tracking-light text-[32px] font-light leading-tight text-left pb-3">建立你的新挑战</h1>
<!-- Progress Bar -->
<div class="flex flex-col gap-3 py-4">
<div class="flex gap-6 justify-between">
<p class="text-white/70 text-base font-light leading-normal">Step 1 of 4</p>
</div>
<div class="rounded-full bg-white/10">
<div class="h-2 rounded-full bg-primary" style="width: 25%;"></div>
</div>
</div>
<div class="flex flex-col flex-1 items-center justify-center py-8">
<!-- Duration Selection Card -->
<p class="text-white/80 text-sm font-normal tracking-wider mb-4">Select Duration</p>
<div class="flex w-full items-center justify-between">
<!-- Left Arrow -->
<button class="p-4">
<span class="material-symbols-outlined text-primary text-4xl">chevron_left</span>
</button>
<!-- Central Card Content -->
<div class="flex flex-col items-center justify-center flex-1 h-64 bg-white/5 rounded-xl border border-white/10 backdrop-blur-xl">
<p class="text-white text-7xl font-light">7 <span class="text-3xl font-light align-middle">Days</span></p>
</div>
<!-- Right Arrow -->
<button class="p-4">
<span class="material-symbols-outlined text-primary text-4xl">chevron_right</span>
</button>
</div>
</div>
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-5">
<div class="h-2 w-2 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-white/20"></div>
<div class="h-2 w-2 rounded-full bg-white/20"></div>
<div class="h-2 w-2 rounded-full bg-white/20"></div>
</div>
<!-- Single Button -->
<div class="flex px-0 py-6">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 flex-1 bg-primary text-background-dark text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Next Step</span>
</button>
</div>
</div>
</div>
</body></html>
