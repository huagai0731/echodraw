<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Artwork Exhibit Template - EchoDraw</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght=200;300;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#98DBC6", // mint blue-green
            "background-dark": "#221B1B", // deep coffee brown
            "accent-brown": "#4A3F4A",
            "accent-light-blue": "#C5E1E2",
            "accent-milky": "#EFEAE7",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .font-ultralight {
      font-weight: 200;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .frosted-card {
      background-color: rgba(74, 63, 74, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    @keyframes subtle-pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.1;
      }
      50% {
        transform: scale(1.1);
        opacity: 0.15;
      }
    }
    .animate-subtle-pulse {
      animation: subtle-pulse 10s ease-in-out infinite;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<div class="absolute top-0 -left-20 size-96 rounded-full bg-primary/10 blur-3xl filter animate-subtle-pulse"></div>
<div class="absolute bottom-0 -right-20 size-96 rounded-full bg-accent-brown/20 blur-3xl filter animate-subtle-pulse" style="animation-delay: 5s;"></div>
<header class="flex w-full items-center justify-between px-4 pt-4 sm:px-6 md:px-8 z-20">
<button class="flex size-10 items-center justify-center rounded-full text-white/80 transition-colors hover:bg-white/10">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="font-ultralight tracking-widest text-white/90">导出模板</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 flex flex-col">
<div class="w-full max-w-sm mx-auto flex-shrink-0 px-4 pt-4">
<div class="relative w-full rounded-xl overflow-hidden shadow-2xl shadow-black/50 bg-background-dark flex flex-col">
<div class="aspect-[3/4] w-full bg-cover bg-center bg-no-repeat" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAmdXZkW8eo57ACXUi0lVGWMox55fN555Vv8qR2Uf-uwBpJTj9WDKjQxJ4v96ipfKpYL9vAzw67DSCQedVFVgLxO7NGVeTAPzqmBqAJiYWffjbYv6ornNzJ5pTObpy1eCGveRD80HfD011bGjqso6jfmSxPAu2ML5GedM5yVosX_PQ13_YIPwVOwKgFhOAhsqq0l4x_TD9ClOCUGmWYSo4my2JnNt2Gl8cK7X8vxuqDSowPF6_vz5Pk-Hy7HNXRZjM8dAb7aruIUS0O");'></div>
<div class="w-full p-4 bg-gradient-to-t from-[#221B1B] via-[#221B1B]/95 to-[#221B1B]/80" style="background-color: var(--shadow-color, #221B1B);">
<div class="space-y-1.5" style="color: var(--text-color, #FFFFFF);">
<h2 class="font-ultralight text-[11px] leading-tight tracking-normal text-inherit">Ephemeral Bloom</h2>
<p class="font-ultralight text-[9px] leading-snug tracking-normal text-inherit/70">An expressive and colorful abstract floral painting...</p>
<div class="!mt-2 flex flex-wrap items-center gap-1">
<span class="rounded-full border border-primary/50 bg-primary/20 px-1.5 py-0.5 text-[8px] font-light text-primary/90">#floral</span>
<span class="rounded-full border border-primary/50 bg-primary/20 px-1.5 py-0.5 text-[8px] font-light text-primary/90">#oilpainting</span>
</div>
<div class="!mt-2 flex items-center justify-between font-ultralight text-[8px] tracking-widest text-inherit/50">
<span>Aetheria</span>
<span>2024-05-21 • 6h 21m</span>
</div>
</div>
</div>
</div>
</div>
<div class="flex-1 w-full px-4 sm:px-6 pt-6 pb-6 flex flex-col">
<div class="w-full flex-1 frosted-card rounded-xl p-4 space-y-4 flex flex-col">
<div class="flex-1 space-y-4 overflow-y-auto">
<div class="flex items-start gap-3">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60" for="title">标题</label>
<input class="mt-1 block w-full border-0 border-b border-white/20 bg-transparent p-0 pb-1 font-ultralight text-base text-white focus:border-primary focus:ring-0" id="title" type="text" value="Ephemeral Bloom"/>
</div>
<button class="mt-5 text-primary">
<span class="material-symbols-outlined filled">toggle_on</span>
</button>
</div>
<div class="flex items-start gap-3">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60" for="description">简介</label>
<textarea class="mt-1 block w-full resize-none border-0 border-b border-white/20 bg-transparent p-0 pb-1 font-ultralight text-sm leading-relaxed tracking-wide text-white/80 focus:border-primary focus:ring-0" id="description" rows="2">An expressive and colorful abstract floral painting...</textarea>
</div>
<button class="mt-5 text-primary">
<span class="material-symbols-outlined filled">toggle_on</span>
</button>
</div>
<div class="flex items-start gap-3">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60" for="username">用户名</label>
<input class="mt-1 block w-full border-0 border-b border-white/20 bg-transparent p-0 pb-1 font-ultralight text-sm text-white focus:border-primary focus:ring-0" id="username" type="text" value="Aetheria"/>
</div>
<button class="mt-5 text-primary">
<span class="material-symbols-outlined filled">toggle_on</span>
</button>
</div>
<div class="flex items-start gap-3">
<div class="flex-1 space-y-1 pt-2">
<div class="font-ultralight text-sm tracking-wide text-white/80"><span class="text-xs tracking-widest text-white/60">日期:</span> 2024-05-21</div>
</div>
<button class="mt-3 text-primary">
<span class="material-symbols-outlined filled">toggle_on</span>
</button>
</div>
<div class="flex items-start gap-3">
<div class="flex-1 space-y-1">
<div class="font-ultralight text-sm tracking-wide text-white/80"><span class="text-xs tracking-widest text-white/60">画布时长:</span> 6h 21m</div>
</div>
<button class="text-primary">
<span class="material-symbols-outlined filled">toggle_on</span>
</button>
</div>
<div class="flex items-start gap-3 pt-2">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60">标签</label>
<div class="mt-2 flex flex-wrap items-center gap-2">
<button class="flex items-center gap-1.5 rounded-full border border-primary bg-primary/20 px-3 py-1 text-xs font-light text-primary transition-colors hover:bg-primary/30">
<span class="material-symbols-outlined !text-sm filled">check_box</span> floral </button>
<button class="flex items-center gap-1.5 rounded-full border border-white/20 bg-transparent px-3 py-1 text-xs font-light text-white/70 transition-colors hover:bg-white/10">
<span class="material-symbols-outlined !text-sm">check_box_outline_blank</span> abstract </button>
<button class="flex items-center gap-1.5 rounded-full border border-primary bg-primary/20 px-3 py-1 text-xs font-light text-primary transition-colors hover:bg-primary/30">
<span class="material-symbols-outlined !text-sm filled">check_box</span> oilpainting </button>
</div>
</div>
</div>
<div class="!mt-6 space-y-4 pt-4 border-t border-white/10">
<div class="flex items-center gap-3">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60">自定义阴影区颜色</label>
<div class="mt-2 flex items-center gap-3">
<div class="relative h-2 flex-1 rounded-full bg-gradient-to-r from-accent-brown via-background-dark to-primary/50">
<div class="absolute top-1/2 -ml-2 h-4 w-4 rounded-full border-2 border-white bg-accent-brown shadow-lg" style="left: 40%; transform: translateY(-50%);"></div>
</div>
<div class="h-6 w-6 rounded-full border border-white/20 bg-background-dark"></div>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<div class="flex-1">
<label class="font-ultralight text-xs tracking-widest text-white/60">自定义文字颜色</label>
<div class="mt-2 flex items-center gap-3">
<div class="relative h-2 flex-1 rounded-full bg-gradient-to-r from-white/50 via-white to-accent-milky">
<div class="absolute top-1/2 -ml-2 h-4 w-4 rounded-full border-2 border-white bg-white shadow-lg" style="left: 70%; transform: translateY(-50%);"></div>
</div>
<div class="h-6 w-6 rounded-full border border-white/20 bg-white"></div>
</div>
</div>
</div>
</div>
</div>
<div class="pt-4">
<button class="w-full rounded-full bg-primary py-3 text-center font-light tracking-widest text-background-dark shadow-lg shadow-primary/20 transition-all hover:bg-opacity-90 hover:shadow-primary/30 active:scale-95"> 保存为图片 </button>
</div>
</div>
</div>
</main>
</div>
