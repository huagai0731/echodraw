<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Plan Progress</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#98DBC6",
            "background-light": "#221B1B",
            "background-dark": "#221B1B",
            "card-bg": "rgba(74, 63, 74, 0.5)",
            "card-bg-solid": "#4A3F4A",
            "muted-text": "#EFEAE7",
            "highlight": "#C5E1E2",
          },
          fontFamily: {
            "display": ["Manrope", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "0.75rem",
            "xl": "1rem",
            "2xl": "1.25rem",
            "full": "9999px"
          },
          boxShadow: {
            'glow-primary': '0 0 25px 0 rgba(152, 219, 198, 0.3)',
            'glow-primary-subtle': '0 0 15px 0 rgba(152, 219, 198, 0.2)',
          }
        },
      },
    }
  </script>
<style>
    body {
      font-weight: 300;
      min-height: max(884px, 100dvh);
      background-color: #221B1B;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .ticket-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .timeline {
      position: relative;
    }
    .timeline-line {
      position: absolute;
      top: 0;
      left: 10px;
      transform: translateX(-50%);
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, #98DBC6 0%, #98DBC6 var(--timeline-progress, 33%), rgba(74, 63, 74, 0.6) var(--timeline-progress, 33%), rgba(74, 63, 74, 0.6) 100%);
      box-shadow: 0 0 10px rgba(152, 219, 198, 0.2);
    }
    .timeline-item {
      position: relative;
      padding-left: 36px;
      padding-bottom: 24px;
    }
    .timeline-item:last-child {
      padding-bottom: 0;
    }
    .timeline-dot {
      position: absolute;
      top: 4px; 
      left: 10px;
      transform: translateX(-50%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display text-white">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-dark overflow-x-hidden">
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[10%] left-[5%] w-48 h-48 bg-primary/10 rounded-full blur-3xl animate-[pulse_8s_ease-in-out_infinite]"></div>
<div class="absolute top-[40%] right-[-10%] w-64 h-64 bg-primary/20 rounded-full blur-3xl animate-[pulse_10s_ease-in-out_infinite_2s]"></div>
<div class="absolute bottom-[5%] left-[15%] w-40 h-40 bg-highlight/10 rounded-full blur-3xl animate-[pulse_9s_ease-in-out_infinite_1s]"></div>
</div>
<div class="relative z-10 flex flex-col flex-1">
<header class="flex items-center bg-transparent p-4 pb-0 justify-between">
<button class="flex size-12 shrink-0 items-center justify-start text-white">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<div class="flex size-12 shrink-0 items-center"></div>
</header>
<div class="px-6 pb-8">
<h1 class="text-white text-3xl font-medium leading-tight tracking-wide">40小时计划</h1>

</div>
<main class="flex-1 px-6 pb-28">
<div class="timeline" style="--timeline-progress: 33%;">
<div class="timeline-line"></div>
<div class="timeline-item">
<div class="timeline-dot">
<div class="flex items-center justify-center bg-primary rounded-full size-5 text-background-dark shadow-glow-primary-subtle">
<span class="material-symbols-outlined !text-base">check</span>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="text-muted-text/70 text-sm font-light">
<span>2023-10-05</span>
</div>
<div class="ticket-card rounded-2xl bg-card-bg p-4">
<div class="flex justify-between items-center mb-3">

<span class="text-primary text-sm font-light">耗时 5 天</span>
</div>
<div class="flex items-start gap-4">

<div class="flex flex-col flex-1">
<p class="text-muted-text/80 text-sm font-light leading-relaxed tracking-wide">这次练习专注于光影，对成果非常满意。感觉对体积感的把握更好了。</p>
</div>
</div>
</div>
</div>
</div>
<div class="timeline-item">
<div class="timeline-dot">
<div class="relative flex size-5 items-center justify-center">
<div class="absolute inset-0 rounded-full bg-primary animate-pulse blur-md opacity-75"></div>
<div class="relative rounded-full bg-background-dark p-0.5">
<div class="w-3.5 h-3.5 rounded-full border-2 border-primary"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="text-muted-text/70 text-sm font-light">
<span>2023-10-06</span>
</div>
<div class="ticket-card rounded-2xl bg-card-bg border-primary/50 shadow-glow-primary">
<div class="relative overflow-hidden p-4">
<p class="text-white text-base font-medium">Checkpoint 02</p>
<div class="w-full bg-white/10 rounded-full h-1.5 mt-3">
<div class="bg-primary h-1.5 rounded-full" style="width: 65%;"></div>
</div>
<div class="flex justify-between items-center mt-2 text-sm">
<span class="text-muted-text/70 font-light">26 / 40 小时</span>
<span class="text-primary font-medium">已开始 5 天</span>
</div>
</div>
</div>
</div>
</div>
<div class="timeline-item">
<div class="timeline-dot">
<div class="flex items-center justify-center size-5 border-2 border-white/20 rounded-full bg-background-dark">
<div class="w-1.5 h-1.5 bg-white/20 rounded-full"></div>
</div>
</div>
<div class="ticket-card rounded-2xl bg-transparent border-dashed border-white/20">
<div class="p-4">
<p class="text-muted-text/80 text-base font-medium">Checkpoint 03</p>
</div>
</div>
</div>
<div class="timeline-item">
<div class="timeline-dot">
<div class="flex items-center justify-center size-5 border-2 border-white/20 rounded-full bg-background-dark">
<div class="w-1.5 h-1.5 bg-white/20 rounded-full"></div>
</div>
</div>
<div class="ticket-card rounded-2xl bg-transparent border-dashed border-white/20">
<div class="p-4">
<p class="text-muted-text/80 text-base font-medium">Checkpoint 04</p>
</div>
</div>
</div>
</div>
</main>
</div>
<div class="fixed bottom-0 z-20 w-full p-5 bg-gradient-to-t from-background-dark to-transparent">
<div class="flex justify-center">
<button class="flex w-auto max-w-[480px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-full bg-primary px-6 h-14 text-base font-medium leading-normal tracking-wide text-background-dark shadow-lg shadow-primary/30">
<span class="material-symbols-outlined">ios_share</span>
<span class="truncate">导出</span>
</button>
</div>
</div>
</div>
