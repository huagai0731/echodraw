<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Create New Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#98DBC6", // Mint Blue-Green
                        "background-light": "#EFEAE7", // Milky White (for potential light mode)
                        "background-dark": "#221B1B", // Deep Coffee Brown
                        "card-dark": "rgba(74, 63, 74, 0.4)", // Translucent Brown #4A3F4A
                        "text-light": "#FFFFFF", // White
                        "text-muted": "#C5E1E2", // Light Blue
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .selected-card {
            box-shadow: 0 0 20px 0 rgba(152, 219, 198, 0.5), inset 0 0 0 1px rgba(152, 219, 198, 0.8);
        }
        .backdrop-blur-xl {
            -webkit-backdrop-filter: blur(24px);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-hidden">
<!-- Background decorative elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
<div class="absolute -top-1/4 -left-1/4 w-1/2 h-1/2 bg-primary/10 rounded-full blur-3xl opacity-50"></div>
<div class="absolute bottom-0 -right-1/4 w-1/2 h-1/2 bg-primary/20 rounded-full blur-3xl opacity-30"></div>
</div>
<div class="relative z-10 flex flex-col justify-between min-h-screen p-4 pt-8">
<div class="flex-grow">
<!-- Headline -->
<h2 class="text-text-light tracking-light text-[28px] font-bold leading-tight text-center pb-5">建立你的新挑战</h2>
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-5 mb-6">
<div class="h-2 w-2 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-text-light/30"></div>
<div class="h-2 w-2 rounded-full bg-text-light/30"></div>
</div>
<!-- Card 1 (Selected) -->
<div class="mb-4 @container">
<div class="flex flex-col items-stretch justify-start rounded-xl border border-primary/70 bg-card-dark p-6 backdrop-blur-xl selected-card">
<p class="text-text-light text-lg font-bold leading-tight tracking-[-0.015em]">每日相同任务</p>
<p class="text-text-muted text-base font-normal leading-normal mt-1">适用于想要周期提升特定目标</p>
</div>
</div>
<!-- Card 2 -->
<div class="mb-4 @container">
<div class="flex flex-col items-stretch justify-start rounded-xl border border-white/10 bg-card-dark p-6 backdrop-blur-xl">
<p class="text-text-light text-lg font-bold leading-tight tracking-[-0.015em]">每日设置不同任务</p>
<p class="text-text-muted text-base font-normal leading-normal mt-1">适用于想要尝试更多新事物的画师</p>
</div>
</div>
</div>
<!-- Button -->
<div class="flex px-4 py-3">
<button class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-background-dark text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">下一步</span>
</button>
</div>
</div>
</div>
</body></html>
