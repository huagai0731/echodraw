<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EchoDraw - Create Your New Challenge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            font-weight: 300;
        }
        .frosted-glass {
            background-color: rgba(74, 63, 74, 0.4);
            backdrop-filter: blur(12px);
            --webkit-backdrop-filter: blur(12px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#98DBC6",
              "background-light": "#EFEAE7",
              "background-dark": "#221B1B",
              "coffee-brown": "#221B1B",
              "mint-accent": "#98DBC6",
              "panel-brown": "#4A3F4A",
              "light-blue": "#C5E1E2",
              "milky-white": "#EFEAE7",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-dark text-white">
<div class="relative flex min-h-screen w-full flex-col bg-background-dark dark group/design-root overflow-x-hidden">
<div class="absolute top-0 left-0 h-full w-full overflow-hidden">
<div class="absolute -top-1/4 -left-1/4 h-1/2 w-1/2 rounded-full bg-mint-accent/10 blur-3xl"></div>
<div class="absolute bottom-0 -right-1/4 h-1/2 w-1/2 rounded-full bg-mint-accent/5 blur-3xl"></div>
</div>
<div class="relative z-10 flex flex-grow flex-col px-4 pt-6">
<header class="mb-4">
<h1 class="text-3xl font-light text-white">建立你的新挑战</h1>
<div class="flex w-full items-center gap-2 pt-4">
<div class="h-1 flex-1 rounded-full bg-mint-accent"></div>
<div class="h-1 flex-1 rounded-full bg-mint-accent"></div>
<div class="h-1 flex-1 rounded-full bg-mint-accent"></div>
<div class="h-1 flex-1 rounded-full bg-panel-brown"></div>
</div>
</header>
<div class="py-4">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl border-none bg-panel-brown/50 p-4 text-lg text-white placeholder:text-light-blue/50 focus:outline-0 focus:ring-2 focus:ring-mint-accent/50" value="7日挑战"/>
</div>
<div class="no-scrollbar -mx-4 flex gap-3 overflow-x-auto px-4 py-3">
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-mint-accent px-5">
<p class="text-sm font-medium leading-normal text-coffee-brown">Day 1</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 2</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 3</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 4</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 5</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 6</p>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-lg bg-panel-brown/50 px-5">
<p class="text-sm font-normal leading-normal text-white">Day 7</p>
</button>
</div>
<div class="flex min-h-0 flex-1 flex-col pt-4">
<div class="rounded-xl frosted-glass border border-white/10 p-4">
<h2 class="pb-4 text-xl font-normal text-white/90">已选任务</h2>
<div class="space-y-3">
<div class="flex items-start justify-between rounded-lg bg-black/20 p-3">
<div class="flex-1 pr-3">
<p class="text-base font-normal text-milky-white">速写练习</p>
<p class="text-xs font-light text-milky-white/70">30分钟人物动态</p>
</div>
<div class="flex items-center gap-3 pt-1">
<span class="material-symbols-outlined cursor-pointer text-xl text-white/70">edit</span>
<span class="material-symbols-outlined cursor-pointer text-xl text-white/70">close</span>
</div>
</div>
<div class="flex items-start justify-between rounded-lg bg-black/20 p-3">
<div class="flex-1 pr-3">
<p class="text-base font-normal text-milky-white">色彩研究</p>
<p class="text-xs font-light text-milky-white/70">高饱和度搭配</p>
</div>
<div class="flex items-center gap-3 pt-1">
<span class="material-symbols-outlined cursor-pointer text-xl text-white/70">edit</span>
<span class="material-symbols-outlined cursor-pointer text-xl text-white/70">close</span>
</div>
</div>
</div>
</div>
<div class="mt-6 grid min-h-0 flex-1 grid-cols-12 gap-3 pb-2">
<div class="col-span-4 space-y-2">
<div class="cursor-pointer rounded-lg bg-mint-accent px-3 py-2 text-center">
<p class="text-sm font-medium text-coffee-brown">Sketching</p>
</div>
<div class="cursor-pointer rounded-lg bg-panel-brown/50 px-3 py-2 text-center">
<p class="text-sm font-normal text-white/80">Color Study</p>
</div>
<div class="cursor-pointer rounded-lg bg-panel-brown/50 px-3 py-2 text-center">
<p class="text-sm font-normal text-white/80">Inspiration</p>
</div>
</div>
<div class="no-scrollbar col-span-8 space-y-2 overflow-y-auto">
<div class="flex cursor-pointer items-center justify-between rounded-lg bg-panel-brown/50 p-3">
<div class="flex-1 pr-2">
<p class="text-sm font-normal text-white">人物动态</p>
<p class="text-xs font-light text-white/70">练习快速捕捉人体姿态</p>
</div>
<span class="material-symbols-outlined flex h-6 w-6 items-center justify-center rounded-md bg-white/10 text-base text-mint-accent">add</span>
</div>
<div class="flex cursor-pointer items-center justify-between rounded-lg bg-panel-brown/50 p-3">
<div class="flex-1 pr-2">
<p class="text-sm font-normal text-white">场景透视</p>
<p class="text-xs font-light text-white/70">一点与两点透视法练习</p>
</div>
<span class="material-symbols-outlined flex h-6 w-6 items-center justify-center rounded-md bg-white/10 text-base text-mint-accent">add</span>
</div>
<div class="flex cursor-pointer items-center justify-between rounded-lg bg-panel-brown/50 p-3">
<div class="flex-1 pr-2">
<p class="text-sm font-normal text-white">静物光影</p>
<p class="text-xs font-light text-white/70">单一光源下的阴影描绘</p>
</div>
<span class="material-symbols-outlined flex h-6 w-6 items-center justify-center rounded-md bg-white/10 text-base text-mint-accent">add</span>
</div>
</div>
</div>
</div>
<div class="w-full bg-background-dark pt-4 pb-6">
<button class="flex h-14 w-full items-center justify-center rounded-xl bg-mint-accent">
<p class="text-lg font-bold tracking-wide text-coffee-brown">下一步</p>
</button>
</div>
</div>
<div class="absolute inset-0 z-40 bg-black/60 backdrop-blur-sm"></div>
<div class="absolute inset-0 z-50 flex items-center justify-center p-4">
<div class="flex w-full max-w-sm flex-col rounded-xl border border-white/10 frosted-glass p-6">
<h3 class="mb-6 text-center text-lg font-normal text-white">编辑任务</h3>
<div class="space-y-4">
<div>
<label class="mb-2 block text-sm font-light text-milky-white/80" for="task-name">任务名</label>
<input class="form-input w-full rounded-lg border-none bg-black/20 p-3 text-base text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-mint-accent/50" id="task-name" type="text" value="速写练习"/>
</div>
<div>
<label class="mb-2 block text-sm font-light text-milky-white/80" for="task-description">简介</label>
<textarea class="form-textarea w-full resize-none rounded-lg border-none bg-black/20 p-3 text-base text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-mint-accent/50" id="task-description" rows="3">30分钟人物动态</textarea>
</div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex h-12 items-center justify-center rounded-lg border border-white/20 bg-transparent text-base font-normal text-white">取消</button>
<button class="flex h-12 items-center justify-center rounded-lg bg-mint-accent text-base font-medium text-coffee-brown">保存</button>
</div>
</div>
</div>
</div>

</body></html>
